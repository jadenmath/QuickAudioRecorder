name: Build Windows ARM64 with MP3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ARM64
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "arm64"

      - name: Confirm architecture
        shell: pwsh
        run: |
          python -c "import platform; print(platform.machine()); print(platform.architecture())"

      - name: Set up MSVC ARM64 build tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Install Python dependencies except lameenc
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel build cmake
          pip install PyQt6 soundcard soundfile numpy keyboard pyinstaller

      - name: Build and install lameenc from source
        shell: pwsh
        run: |
          git clone https://github.com/chrisstaite/lameenc.git
          cd lameenc
          python -m pip install . --no-binary lameenc -v

      - name: Verify lameenc
        shell: pwsh
        run: |
          python -c "import lameenc; print('lameenc imported OK')"

      - name: Build exe
        shell: pwsh
        run: |
          pyinstaller --clean --noconsole --onefile --name QuickAudioRecorder main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickAudioRecorder-windows-arm64-mp3
          path: dist/QuickAudioRecorder.exe
