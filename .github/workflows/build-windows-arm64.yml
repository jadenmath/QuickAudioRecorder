name: Build Windows ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ARM64
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "arm64"

      - name: Patch out lameenc / force WAV
        shell: pwsh
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path("audio_recorder.py")
          s = p.read_text(encoding="utf-8")

          s = s.replace("import lameenc", "# import lameenc  # disabled for Windows ARM64 build")

          # Disable MP3 branch by making any mp3 format request fall back to wav.
          s = s.replace('format="mp3"', 'format="wav"')
          s = s.replace("format='mp3'", "format='wav'")
          s = s.replace('"mp3"', '"wav"')
          s = s.replace("'mp3'", "'wav'")

          p.write_text(s, encoding="utf-8")
          PY

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install PyQt6 soundcard soundfile numpy keyboard pyinstaller

      - name: Build exe
        shell: pwsh
        run: |
          pyinstaller --clean --noconsole --onefile --name QuickAudioRecorder main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickAudioRecorder-windows-arm64-wav-only
          path: dist/QuickAudioRecorder.exe
