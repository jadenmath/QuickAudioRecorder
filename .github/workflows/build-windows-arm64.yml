name: Build Windows ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ARM64
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "arm64"

      - name: Confirm architecture
        shell: pwsh
        run: |
          python -c "import platform; print(platform.machine()); print(platform.architecture())"

      - name: Patch out lameenc / force WAV
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          for p in Path(".").rglob("*.py"):
              s = p.read_text(encoding="utf-8", errors="ignore")

              original = s

              s = s.replace("import lameenc", "# import lameenc  # disabled for Windows ARM64 build")
              s = s.replace("from lameenc import Encoder", "# from lameenc import Encoder  # disabled for Windows ARM64 build")

              # Force obvious MP3 format references to WAV.
              s = s.replace('"mp3"', '"wav"')
              s = s.replace("'mp3'", "'wav'")
              s = s.replace(".mp3", ".wav")
              s = s.replace("MP3", "WAV")
              s = s.replace("mp3", "wav")

              if s != original:
                  p.write_text(s, encoding="utf-8")
                  print(f"patched {p}")
          '@ | python

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install PyQt6 soundcard soundfile numpy keyboard pyinstaller

      - name: Build exe
        shell: pwsh
        run: |
          pyinstaller --clean --noconsole --onefile --name QuickAudioRecorder main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickAudioRecorder-windows-arm64-wav-only
          path: dist/QuickAudioRecorder.exe
